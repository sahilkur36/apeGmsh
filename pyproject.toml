[build-system]
requires = ["setuptools >= 68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pyGmsh"
version = "0.1.0"
description = "Gmsh wrapper for structural FEM workflows — Part/Assembly architecture with OpenSees integration."
requires-python = ">= 3.10"
license = {text = "MIT"}
authors = [
    {name = "Nicolás Mora Bowen", email = "nmorabowen@gmail.com"},
]

dependencies = [
    "gmsh",
    "numpy",
    "pandas",
]

[project.optional-dependencies]
plot = ["matplotlib"]
opensees = ["openseespy"]
vtk = []  # VTKExport uses only numpy + stdlib
g2o = ["gmsh2opensees"]
dxf = ["ezdxf"]
viewer = ["PySide6>=6.5", "pyvista>=0.43", "pyvistaqt>=0.11", "vtk>=9.2"]
all = ["matplotlib", "openseespy", "gmsh2opensees", "ezdxf"]

[project.scripts]
pygmsh-viewer = "pyGmshViewer.__main__:main"

[tool.setuptools.packages.find]
where = ["src", "."]
include = ["pyGmsh*", "pyGmshViewer*"]
