name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'internal_docs/**'
      - 'architecture/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'mkdocs.yml'
      - 'src/**'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install apt deps for Qt/VTK (for mkdocstrings imports)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libxcb-cursor0

      - name: Install package with docs-building extras
        # Install every optional extra EXCEPT g2o. gmsh2opensees caps
        # at Python 3.10, and it's imported lazily inside methods so
        # mkdocstrings doesn't need it to document the module.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[plot,opensees,viewer,dxf,docs]"

      - name: Build & deploy to gh-pages
        env:
          QT_QPA_PLATFORM: offscreen
        run: mkdocs gh-deploy --force
