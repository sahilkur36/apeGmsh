name: Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs for the same ref (saves CI minutes on
# force-push / rapid re-push to a PR).
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  # Viewer / viewer-data tests render through offscreen Qt.
  QT_QPA_PLATFORM: offscreen
  # Harmless without openseespy; keeps parity with local invocation.
  LADRUNO_OPENSEES_QUIET: "1"

jobs:
  # Fast, dedicated job for the regression-lock contract tests. These
  # encode invariants that were silently broken before and must never
  # regress (dimensional resolution contract; constraint emission;
  # MPC math). Kept separate so a lock break is an unambiguous,
  # fast-failing signal distinct from a general suite failure.
  lock-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # Canonical skill (skills/apegmsh/) and its derived mirror
      # (.claude/skills/apegmsh-helper/) must stay byte-identical modulo
      # front-matter. Pure-stdlib check, so it runs before the slow installs.
      - name: Skill mirror in sync (canonical -> derived)
        run: python scripts/sync_skill.py --check

      - name: Install apt deps for Qt/VTK
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libxcb-cursor0 libglu1-mesa

      - name: Install package (no openseespy)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[plot,viewer,dxf]" pytest

      - name: Run regression-lock tests
        run: |
          pytest -q -p no:cacheprovider \
            tests/test_resolution_contract.py \
            tests/test_constraint_emission.py \
            tests/test_constraint_mpc_math.py

  # Static gates for the strictly-typed bridge package (charter P12;
  # src/apeGmsh/opensees/architecture/testing.md § "CI gating" declared
  # these required but they were never enforced, and drift accumulated).
  # ruff on the opensees package is fully clean -> hard gate. mypy
  # carries a legacy error baseline -> ratchet: the job fails only when
  # the count GROWS. Pay errors down and lower MYPY_BASELINE with them.
  # Tool versions are pinned because both tools add rules/checks across
  # releases, which would move the measured count under our feet; bump
  # the pins and re-measure the baseline together, in one PR.
  static-gates:
    runs-on: ubuntu-latest
    env:
      # 0 = the package is mypy-clean; the ratchet is now a hard gate.
      # The ratchet machinery stays so a future tool-pin bump that
      # moves the measured count can be absorbed deliberately
      # (bump pins + re-measure + adjust in one PR).
      MYPY_BASELINE: 0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # Same extras as the suite job so mypy sees the same dependency
      # surface (resolved imports change the error count).
      - name: Install package + pinned tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[plot,viewer,dxf]" "mypy==1.20.0" "ruff==0.15.9"

      - name: ruff (opensees package, hard gate)
        run: ruff check src/apeGmsh/opensees

      - name: mypy ratchet (opensees package)
        run: |
          mypy src/apeGmsh/opensees > mypy.out 2>&1 || true
          tail -n 3 mypy.out
          count=$(grep -oE 'Found [0-9]+ error' mypy.out | grep -oE '[0-9]+' || echo 0)
          echo "mypy errors: ${count} (baseline: ${MYPY_BASELINE})"
          if [ "${count}" -gt "${MYPY_BASELINE}" ]; then
            echo "::error::mypy error count grew (${count} > baseline ${MYPY_BASELINE}) — fix the new errors, don't raise the baseline"
            grep ': error:' mypy.out | tail -n 40
            exit 1
          fi
          if [ "${count}" -lt "${MYPY_BASELINE}" ]; then
            echo "::notice::mypy errors dropped to ${count} — lower MYPY_BASELINE in tests.yml to lock in the gain"
          fi

  # The curated suite: everything under tests/ except markers that
  # need an OpenSees runtime not installed here. `live` needs
  # openseespy; `subprocess` needs the standalone OPENSEES binary;
  # `bench` is opt-in perf. openseespy is intentionally NOT installed
  # — opensees-importing tests are marker- or importorskip-guarded and
  # skip cleanly.
  suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install apt deps for Qt/VTK
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libxcb-cursor0 libglu1-mesa

      - name: Install package (no openseespy)
        run: |
          python -m pip install --upgrade pip
          # partition-pymetis: opt-in extra added in this PR (feat/partition-weighted).
          # Installs pymetis (METIS Python bindings) so TestPartitionWeighted runs
          # against the real backend on Linux instead of being importorskip'd.
          pip install -e ".[plot,viewer,dxf,partition-pymetis]" pytest

      - name: Run curated suite
        run: |
          pytest tests -q -p no:cacheprovider \
            -m "not live and not subprocess and not bench"
