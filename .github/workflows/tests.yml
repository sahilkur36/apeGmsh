name: Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs for the same ref (saves CI minutes on
# force-push / rapid re-push to a PR).
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  # Viewer / viewer-data tests render through offscreen Qt.
  QT_QPA_PLATFORM: offscreen
  # Harmless without openseespy; keeps parity with local invocation.
  LADRUNO_OPENSEES_QUIET: "1"

jobs:
  # Fast, dedicated job for the regression-lock contract tests. These
  # encode invariants that were silently broken before and must never
  # regress (dimensional resolution contract; constraint emission;
  # MPC math). Kept separate so a lock break is an unambiguous,
  # fast-failing signal distinct from a general suite failure.
  lock-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # Canonical skill (skills/apegmsh/) and its derived mirror
      # (.claude/skills/apegmsh-helper/) must stay byte-identical modulo
      # front-matter. Pure-stdlib check, so it runs before the slow installs.
      - name: Skill mirror in sync (canonical -> derived)
        run: python scripts/sync_skill.py --check

      - name: Install apt deps for Qt/VTK
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libxcb-cursor0 libglu1-mesa

      - name: Install package (no openseespy)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[plot,viewer,dxf]" pytest

      - name: Run regression-lock tests
        run: |
          pytest -q -p no:cacheprovider \
            tests/test_resolution_contract.py \
            tests/test_constraint_emission.py \
            tests/test_constraint_mpc_math.py

  # The curated suite: everything under tests/ except markers that
  # need an OpenSees runtime not installed here. `live` needs
  # openseespy; `subprocess` needs the standalone OPENSEES binary;
  # `bench` is opt-in perf. openseespy is intentionally NOT installed
  # — opensees-importing tests are marker- or importorskip-guarded and
  # skip cleanly.
  suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install apt deps for Qt/VTK
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libxcb-cursor0 libglu1-mesa

      - name: Install package (no openseespy)
        run: |
          python -m pip install --upgrade pip
          # partition-pymetis: opt-in extra added in this PR (feat/partition-weighted).
          # Installs pymetis (METIS Python bindings) so TestPartitionWeighted runs
          # against the real backend on Linux instead of being importorskip'd.
          pip install -e ".[plot,viewer,dxf,partition-pymetis]" pytest

      - name: Run curated suite
        run: |
          pytest tests -q -p no:cacheprovider \
            -m "not live and not subprocess and not bench"
