name: Benchmarks

# Nightly cross-rank constraint cost microbenchmark per ADR 0038
# §"v1 scope gate". Runs on a fresh ubuntu-latest rig so numbers are
# comparable across runs; NOT triggered on push/pr to keep regular CI
# fast and to keep benchmark wall-clock variance out of the gating
# loop.

on:
  schedule:
    # Nightly at 06:00 UTC.
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  QT_QPA_PLATFORM: offscreen
  LADRUNO_OPENSEES_QUIET: "1"

jobs:
  cross-rank-constraint-cost:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 24 cells × ~2-3 min worst case.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install apt deps for Qt/VTK
        # Mirror tests.yml — apeGmsh import chain pulls Qt-side
        # initialization in viewer-aware modules.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libxcb-cursor0 libglu1-mesa

      - name: Install package + benchmark deps
        # psutil for peak-RSS measurement. openseespy is installed
        # so future bench cells that need a real runtime (currently
        # none — the present benchmark uses compile() for parse
        # cost and emits via the bridge) can opt in without a
        # workflow change.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[plot,viewer,dxf,opensees]" pytest psutil

      - name: Run cross-rank constraint cost benchmark
        run: |
          pytest tests/benchmarks -m bench -v -p no:cacheprovider

      - name: Upload populated markdown table
        # Always upload — even on failure we want to see partial
        # cells so a regression is debuggable.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-rank-constraint-cost
          path: docs/benchmarks/cross_rank_constraint_cost.md

      # TODO: auto-PR the docs/benchmarks/ update back to main so the
      # populated table is visible in the rendered mkdocs site. For
      # now the artifact above carries the result for manual review;
      # picking a bot identity + token scope for the auto-PR step is
      # deferred to a follow-up that wires up the docs publish path.
